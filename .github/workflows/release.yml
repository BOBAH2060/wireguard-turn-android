name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'build-tools;29.0.3'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew :ui:assembleRelease --stacktrace

    - name: Get version from gradle.properties
      id: version
      run: |
        VERSION_NAME=$(grep wireguardVersionName gradle.properties | cut -d'=' -f2)
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME"

    - name: Generate release notes
      id: release_notes
      run: |
        PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -n 1)

        if [ -n "$PREVIOUS_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" $PREVIOUS_TAG..HEAD)
          CHANGELOG_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
        else
          COMMITS=$(git log --pretty=format:"- %s (%h)")
          CHANGELOG_URL="https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
        fi

        cat > RELEASE_NOTES.md << EOF
        # WG Turn Wrap ${{ github.ref_name }}

        Android WireGuard client fork with integrated TURN proxy transport and optional WRAP obfuscation.

        ## APK

        - App name: WG Turn Wrap
        - Package: com.wgturn.android
        - Version: ${{ steps.version.outputs.version }}
        - Supported ABIs: arm64-v8a, armeabi-v7a, x86, x86_64

        ## What's New

        $COMMITS

        ## Install

        Download the attached APK from this release and install it on Android.
        If Android blocks installation, allow installation from the browser or file manager you are using.

        ## WRAP Notes

        WRAP requires the same 64-hex-character key on the Android client and on the compatible TURN proxy server.
        A wrong key usually causes server-side AEAD authentication errors during the DTLS handshake.

        ## Privacy

        Do not publish real WireGuard private keys, preshared keys, TURN credentials, VK links, or WRAP keys in public logs or issues.

        **Full changelog**: $CHANGELOG_URL
        EOF

        echo "release_notes_file=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: mv ui/build/outputs/apk/release/ui-release.apk ui/build/outputs/apk/release/WG-Turn-Wrap-v${{ steps.version.outputs.version }}.apk

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: ui/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: WG Turn Wrap ${{ github.ref_name }}
        files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        draft: false
        prerelease: false
        body_path: ${{ steps.release_notes.outputs.release_notes_file }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
